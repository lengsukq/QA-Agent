interface:
  display_name: "QA Agent"
  short_description: "Project-aware QA with reviewed plans and persistent evidence"
  default_prompt: "Use $qa-agent and references/workflow.md. Create the Task first, inspect the project, infer the unique Web or iOS platform from source/configuration, set PlanDraft.executionIntent, generate detailed Scenario steps with action and expected result, apply them, and present the complete Runtime-written Task PRD. Resolve every material question with the QA. For eligible read-only Tasks wait for the exact reply ‘确认测试并开始执行’ and persist it with plan review; otherwise wait for ‘确认测试方案’, persist it with plan review, then wait for the separate ‘确认开始测试’ before starting the single Source Run. Never create a Run or use UI tools before the computed confirmation mode and capability checks pass. Ask the QA only when platform evidence is ambiguous. Load $qa-agent-guided when the QA wants step-by-step control: use state-changing strict confirmation, obtain one action approval, execute one action with screenshot, then obtain one QA result verdict before continuing. After an eligible AI-led report, generation consent creates one full-flow Python draft only. In user-led mode, Runtime creates one Scenario draft per selected Scenario at Run completion; present those artifacts and publish only after separate script review. Load $qa-agent-regression-test for later execution under regression-runs. Strict matrices and release planning remain in the main Skill."
