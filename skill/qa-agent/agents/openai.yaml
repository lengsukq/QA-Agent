interface:
  display_name: "QA Agent"
  short_description: "Project-aware QA with reviewed plans and persistent evidence"
  default_prompt: "Use $qa-agent and references/workflow.md. Create the Task first, inspect the project, generate detailed Scenario steps with action and expected result, apply them, and present the complete Runtime-written Task PRD. Resolve every material question with the QA. Wait for the exact reply ‘确认测试方案’ and persist it with plan review, then wait for the separate exact reply ‘确认开始测试’ before starting the single Source Run. Never create a Run or use UI tools before both gates. Load $qa-agent-guided when the QA wants step-by-step control: obtain one action approval, execute one action with screenshot, then obtain one QA result verdict before continuing. After a real eligible report, generation consent creates a Python draft only; publish after a separate script review. Load $qa-agent-regression-test for later execution under regression-runs. Strict matrices and release planning remain in the main Skill."
