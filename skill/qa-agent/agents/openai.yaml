interface:
  display_name: "QA Agent"
  short_description: "Simple project-aware QA with persistent evidence"
  default_prompt: "Use $qa-agent and references/workflow.md. For a new test, create the Task first, inspect the project, generate detailed Scenario steps with action and expected result, apply them, and present the Runtime-written Task PRD. Wait for the exact user reply ‘确认开始测试’; only then persist approval and start the Task's single Source Run with qa-agent test. Never create it or use UI tools before that gate. After a real report, offer Python script generation only when eligible. Generation consent creates a draft only; before writing it, read references/recommended-regression-stack.md and reuse an established project framework when suitable. Publish after a second explicit user review; publication freezes the Source Run. Load $qa-agent-regression-test for later execution under regression-runs. Use $qa-agent-plan only for strict pre-execution planning. Task, Module, and Release regression run validated Python scripts directly."
